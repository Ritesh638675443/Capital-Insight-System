kind = "data-app"
previewPath = "/"
title = "Insurance ALM Decision Support System"
version = "1.0.0"
id = "artifacts/alm-dss"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20407

[services.development]
run = "pnpm --filter @workspace/alm-dss run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alm-dss", "run", "build" ]
publicDir = "artifacts/alm-dss/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20407"
BASE_PATH = "/"
